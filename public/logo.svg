<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient to simulate the 3D lighting (Top-Left Light to Bottom-Right Dark) -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C60FE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 
    Hexagon Path:
    - Filled with none (transparent center)
    - Thick stroke creates the ribbon shape
    - Round line joins create the soft, rounded corners
  -->
  <path d="M 50 10 L 84.6 30 L 84.6 70 L 50 90 L 15.4 70 L 15.4 30 Z" 
        fill="none" 
        stroke="url(#blueGradient)" 
        stroke-width="14" 
        stroke-linejoin="round" 
        stroke-linecap="round" />
</svg>