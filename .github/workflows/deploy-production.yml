name: Deploy Frontend

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  # Determine environment: manual input takes precedence, then branch-based
  TARGET_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/staging' && 'staging' || 'production') }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Deploy Frontend (${{ github.event.inputs.environment || (github.ref == 'refs/heads/staging' && 'staging' || 'production') }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/staging' && 'staging' || 'production') }}

    steps:
      - name: Set Environment Variables
        id: env
        run: |
          if [ "${{ env.TARGET_ENV }}" = "staging" ]; then
            echo "VITE_API_URL=https://stg.app.odly.ai" >> $GITHUB_OUTPUT
            echo "VITE_APP_URL=https://stg.odly.ai" >> $GITHUB_OUTPUT
            echo "DEPLOY_PATH=/var/www/frontend-staging" >> $GITHUB_OUTPUT
            echo "NGINX_CONF=stg.odly.ai" >> $GITHUB_OUTPUT
            echo "ENV_LABEL=STAGING" >> $GITHUB_OUTPUT
          else
            echo "VITE_API_URL=https://app.odly.ai" >> $GITHUB_OUTPUT
            echo "VITE_APP_URL=https://odly.ai" >> $GITHUB_OUTPUT
            echo "DEPLOY_PATH=/var/www/frontend" >> $GITHUB_OUTPUT
            echo "NGINX_CONF=app.odly.ai" >> $GITHUB_OUTPUT
            echo "ENV_LABEL=PRODUCTION" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Build frontend
        env:
          VITE_API_URL: ${{ steps.env.outputs.VITE_API_URL }}
          VITE_APP_URL: ${{ steps.env.outputs.VITE_APP_URL }}
          # Inline version info — surfaced in Layout sidebar footer next to FE version.
          VITE_GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "placeholder"

      - name: Add Known Hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ steps.env.outputs.DEPLOY_PATH }}
        run: |
          ssh ${SSH_USER}@${SSH_HOST} << ENDSSH
            set -e

            echo "🚀 Starting frontend deployment..."
            DEPLOY_PATH="${DEPLOY_PATH}"

            # Create frontend directory if it doesn't exist
            mkdir -p \$DEPLOY_PATH

            # Install nginx if not installed
            if ! command -v nginx &> /dev/null; then
              echo "📦 Installing nginx..."
              apt-get update
              apt-get install -y nginx
            fi

            echo "✅ Frontend directory ready: \$DEPLOY_PATH"
          ENDSSH

      - name: Copy built files
        env:
          DEPLOY_PATH: ${{ steps.env.outputs.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_PATH}/

          # Fix permissions after rsync
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chown -R www-data:www-data ${DEPLOY_PATH}"

      # Note: Nginx configuration for app.odly.ai is managed manually on the server
      # Do not regenerate configs here to avoid conflicts with landing page (odly.ai)

      - name: Reload Nginx
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh ${SSH_USER}@${SSH_HOST} << 'ENDSSH'
            set -e
            echo "🔄 Reloading nginx..."
            nginx -t && systemctl reload nginx
            echo "✅ Nginx reloaded"
          ENDSSH

      - name: Verify Deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_URL: ${{ steps.env.outputs.VITE_APP_URL }}
        run: |
          echo "🏥 Running health check..."
          sleep 3

          # Check if frontend is accessible
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${APP_URL}/ || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Frontend health check passed!"
          else
            echo "⚠️  Frontend returned code: $HTTP_CODE"
            echo "This might be expected if nginx needs more time to start"
          fi

      - name: Deployment Summary
        if: always()
        env:
          ENV_NAME: ${{ steps.env.outputs.ENV_LABEL }}
          APP_URL: ${{ steps.env.outputs.VITE_APP_URL }}
          API_URL: ${{ steps.env.outputs.VITE_API_URL }}
        run: |
          echo "## Frontend Deployment Summary 📋 - ${ENV_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${ENV_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server IP**: ${{ secrets.SSH_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Frontend: ${APP_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- 📚 API: ${API_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- 🏥 Backend Health: ${API_URL}/health" >> $GITHUB_STEP_SUMMARY
